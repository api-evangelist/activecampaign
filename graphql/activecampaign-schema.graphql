"""
ActiveCampaign Conceptual GraphQL Schema
Source: https://developers.activecampaign.com/reference/overview
Version: v3 REST API translation
Note: ActiveCampaign does not expose a native GraphQL endpoint.
      This is a conceptual schema derived from the REST API surface.
"""

scalar DateTime
scalar JSON
scalar URL

# ─────────────────────────────────────────────
# ROOT TYPES
# ─────────────────────────────────────────────

type Query {
  # Contacts
  contact(id: ID!): Contact
  contacts(limit: Int, offset: Int, search: String, tag: ID, listId: ID): ContactConnection!

  # Accounts
  account(id: ID!): Account
  accounts(limit: Int, offset: Int, search: String): AccountConnection!

  # Automations
  automation(id: ID!): Automation
  automations(limit: Int, offset: Int, status: AutomationStatus): AutomationConnection!

  # Campaigns
  campaign(id: ID!): Campaign
  campaigns(limit: Int, offset: Int, status: CampaignStatus): CampaignConnection!

  # Lists
  list(id: ID!): List
  lists(limit: Int, offset: Int): ListConnection!

  # Tags
  tag(id: ID!): Tag
  tags(limit: Int, offset: Int, search: String): TagConnection!

  # Deals
  deal(id: ID!): Deal
  deals(limit: Int, offset: Int, stageId: ID, pipelineId: ID): DealConnection!

  # Pipelines
  dealPipeline(id: ID!): DealPipeline
  dealPipelines(limit: Int, offset: Int): DealPipelineConnection!

  # Deal Stages
  dealStage(id: ID!): DealStage
  dealStages(pipelineId: ID): DealStageConnection!

  # Tasks
  task(id: ID!): Task
  tasks(limit: Int, offset: Int, dealId: ID, contactId: ID): TaskConnection!

  # Notes
  note(id: ID!): Note
  notes(limit: Int, offset: Int, contactId: ID, dealId: ID): NoteConnection!

  # Custom Fields
  customField(id: ID!): CustomField
  customFields(limit: Int, offset: Int, type: CustomFieldType): CustomFieldConnection!

  # Templates
  template(id: ID!): Template
  templates(limit: Int, offset: Int): TemplateConnection!

  # Messages
  message(id: ID!): Message
  messages(limit: Int, offset: Int): MessageConnection!

  # Conversations
  conversation(id: ID!): Conversation
  conversations(limit: Int, offset: Int, status: ConversationStatus): ConversationConnection!

  # Forms
  form(id: ID!): Form
  forms(limit: Int, offset: Int): FormConnection!

  # Segments
  segment(id: ID!): Segment
  segments(limit: Int, offset: Int): SegmentConnection!

  # Scores
  score(id: ID!): Score
  scores(limit: Int, offset: Int): ScoreConnection!

  # Users
  user(id: ID!): User
  users(limit: Int, offset: Int): UserConnection!

  # Groups
  group(id: ID!): Group
  groups(limit: Int, offset: Int): GroupConnection!

  # Webhooks
  webhook(id: ID!): Webhook
  webhooks(limit: Int, offset: Int): WebhookConnection!

  # Tracking
  siteTracking(id: ID!): SiteTracking
  siteTrackings(limit: Int, offset: Int): SiteTrackingConnection!

  eventTracking(id: ID!): EventTracking
  eventTrackings(limit: Int, offset: Int): EventTrackingConnection!

  eventLogs(contactId: ID, limit: Int, offset: Int): EventLogConnection!

  # Reports
  report(campaignId: ID!): Report

  # Calendar Feeds
  calendarFeed(id: ID!): CalendarFeed
  calendarFeeds(limit: Int, offset: Int): CalendarFeedConnection!

  # Branded Links
  brandedLink(id: ID!): BrandedLink
  brandedLinks(limit: Int, offset: Int): BrandedLinkConnection!

  # Bounces
  bounces(limit: Int, offset: Int, contactId: ID): BounceConnection!

  # Import Status
  importStatus(id: ID!): ImportStatus
}

type Mutation {
  # Contacts
  createContact(input: CreateContactInput!): Contact!
