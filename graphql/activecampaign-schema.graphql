"""A contact record representing a person in the ActiveCampaign database."""
type Contact {
  id: ID!
  email: String!
  firstName: String
  lastName: String
  phone: String
  orgName: String
  deleted: Boolean!
  bounced: Boolean!
  createdTimestamp: DateTime!
  updatedTimestamp: DateTime!
  tags: [ContactTag!]!
  lists: [Subscription!]!
  fieldValues: [FieldValue!]!
  notes: [Note!]!
  activities: [Activity!]!
  automations: [ContactAutomation!]!
  deals: [DealContact!]!
  accounts: [AccountContact!]!
  scores: [Score!]!
  geolocation: Geolocation
  ipAddress: String
  ua: String
  trackingDomain: String
}

"""An organization or company that contacts can be associated with."""
type Account {
  id: ID!
  name: String!
  accountUrl: URL
  createdTimestamp: DateTime!
  updatedTimestamp: DateTime!
  contacts: [AccountContact!]!
  deals: [Deal!]!
  notes: [Note!]!
  fieldValues: [FieldValue!]!
}

"""Join type linking a Contact to an Account."""
type AccountContact {
  id: ID!
  contact: Contact!
  account: Account!
  jobTitle: String
  createdTimestamp: DateTime!
  updatedTimestamp: DateTime!
}

"""A marketing or operational automation workflow."""
