  # Tasks
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: ID!, input: UpdateTaskInput!): Task!
  deleteTask(id: ID!): DeleteResult!

  # Notes
  createNote(input: CreateNoteInput!): Note!
  updateNote(id: ID!, input: UpdateNoteInput!): Note!
  deleteNote(id: ID!): DeleteResult!

  # Automations
  enrollContactInAutomation(contactId: ID!, automationId: ID!): ContactAutomation!
  removeContactFromAutomation(contactId: ID!, automationId: ID!): DeleteResult!

  # Campaigns
  createCampaign(input: CreateCampaignInput!): Campaign!
  updateCampaign(id: ID!, input: UpdateCampaignInput!): Campaign!
  deleteCampaign(id: ID!): DeleteResult!

  # Messages
  createMessage(input: CreateMessageInput!): Message!
  updateMessage(id: ID!, input: UpdateMessageInput!): Message!
  deleteMessage(id: ID!): DeleteResult!

  # Templates
  createTemplate(input: CreateTemplateInput!): Template!
  updateTemplate(id: ID!, input: UpdateTemplateInput!): Template!
  deleteTemplate(id: ID!): DeleteResult!

  # Webhooks
  createWebhook(input: CreateWebhookInput!): Webhook!
  updateWebhook(id: ID!, input: UpdateWebhookInput!): Webhook!
  deleteWebhook(id: ID!): DeleteResult!

  # Users
  createUser(input: CreateUserInput!): User!
  updateUser(id: ID!, input: UpdateUserInput!): User!
  deleteUser(id: ID!): DeleteResult!

  # Groups
  createGroup(input: CreateGroupInput!): Group!
  updateGroup(id: ID!, input: UpdateGroupInput!): Group!
  deleteGroup(id: ID!): DeleteResult!

  # Conversations
  createConversation(input: CreateConversationInput!): Conversation!
  updateConversation(id: ID!, input: UpdateConversationInput!): Conversation!

  # Conversation Messages
  createConversationMessage(input: CreateConversationMessageInput!): ConversationMessage!

  # Scores
  createScore(input: CreateScoreInput!): Score!
  updateScore(id: ID!, input: UpdateScoreInput!): Score!
  deleteScore(id: ID!): DeleteResult!

  # Segments
  createSegment(input: CreateSegmentInput!): Segment!
  updateSegment(id: ID!, input: UpdateSegmentInput!): Segment!
  deleteSegment(id: ID!): DeleteResult!

  # Tracking
  createSiteTracking(input: CreateSiteTrackingInput!): SiteTracking!
  updateSiteTracking(id: ID!, input: UpdateSiteTrackingInput!): SiteTracking!
  deleteSiteTracking(id: ID!): DeleteResult!

  createEventTracking(input: CreateEventTrackingInput!): EventTracking!
  updateEventTracking(id: ID!, input: UpdateEventTrackingInput!): EventTracking!
  deleteEventTracking(id: ID!): DeleteResult!

  logEvent(input: LogEventInput!): EventLog!

  # Calendar Feeds
  createCalendarFeed(input: CreateCalendarFeedInput!): CalendarFeed!
  updateCalendarFeed(id: ID!, input: UpdateCalendarFeedInput!): CalendarFeed!
  deleteCalendarFeed(id: ID!): DeleteResult!

  # Forms
  createForm(input: CreateFormInput!): Form!
  updateForm(id: ID!, input: UpdateFormInput!): Form!
