- type: Features
  data:
  - name: Email Marketing
    description: Create and send conversion-focused email campaigns with personalization
      and segmentation.
  - name: Marketing Automation
    description: Build automated customer journeys and workflows triggered by contact
      behavior and events.
  - name: CRM
    description: Built-in sales CRM for managing deals, pipelines, tasks, and customer
      relationships.
  - name: SMS Marketing
    description: Reach contacts via SMS broadcast campaigns with AI-powered content
      generation.
  - name: WhatsApp Messaging
    description: Automate growth and customer engagement through WhatsApp communications.
  - name: Transactional Email
    description: Automate transactional alerts, password resets, and notifications
      via Postmark integration.
  - name: Custom Objects
    description: Create custom data schemas to activate complex data for segmentation
      and personalized automation.
  - name: Contact Event Tracking
    description: Track contact behaviors and activities across web properties and
      integrations.
  - name: Webhooks
    description: Receive real-time event notifications for contact, campaign, automation,
      and custom object activities.
  - name: Landing Pages
    description: Deploy conversion-ready landing pages for lead capture and campaigns.
  - name: Active Intelligence
    description: AI-powered orchestration and autonomous marketing agents for campaign
      suggestions and personalization.
  - name: MCP Server
    description: Connect AI applications to ActiveCampaign using the Model Context
      Protocol server.
- type: UseCases
  data:
  - name: Lead Nurturing
    description: Automate email sequences to nurture leads through the sales funnel
      based on behavior.
  - name: E-Commerce Automation
    description: Trigger post-purchase emails, abandoned cart recovery, and personalized
      product recommendations.
  - name: Customer Onboarding
    description: Automate onboarding sequences for SaaS products to improve activation
      and retention.
  - name: Contact Segmentation
    description: Segment contacts using tags, custom fields, and custom objects for
      targeted campaigns.
  - name: Sales Pipeline Management
    description: Manage deals, tasks, and pipeline stages with CRM and automation
      integration.
  - name: SMS Broadcast Campaigns
    description: Send targeted SMS campaigns to subscriber lists with engagement tracking.
  - name: Webhook-Driven Integrations
    description: Build real-time integrations using webhooks for contact and campaign
      activity events.
- type: Integrations
  data:
  - name: Salesforce
    description: Sync contact and deal data between ActiveCampaign and Salesforce
      CRM.
  - name: Zapier
    description: Connect ActiveCampaign to 1000+ apps via Zapier automation workflows.
  - name: Slack
    description: Send notifications and trigger automations from Slack using OAuth2
      integration.
  - name: Calendly
    description: Sync scheduling data and trigger automations with custom objects
      via OAuth2.
  - name: Twilio
    description: Integrate SMS workflows using Twilio with Basic Auth for outbound
      messaging.
  - name: Shopify
    description: Sync ecommerce customers, orders, and products for automated campaigns.
  - name: WordPress
    description: Embed forms and capture leads from WordPress sites.
  - name: Wix
    description: Connect Wix websites for lead capture and customer journey automation.
- type: Solutions
  data:
  - name: Starter
    description: Entry-level plan with marketing automation, up to 5 automation actions,
      and 1 user.
  - name: Plus
    description: Mid-tier plan with unlimited automation actions, landing pages, and
      standard segmentation.
  - name: Pro
    description: Advanced plan with predictive content, advanced segmentation, and
      3 users.
  - name: Enterprise
    description: Full-featured plan with custom objects, dedicated account team, and
      premium segmentation.
