naftiko: 1.0.0-alpha2
info:
  label: ActiveCampaign SMS Broadcast API — Failures
  description: 'ActiveCampaign SMS Broadcast API — Failures. 1 operations. Lead operation: ActiveCampaign Get Broadcast Failure
    Details. Self-contained Naftiko capability covering one Activecampaign business surface.'
  tags:
  - Activecampaign
  - Failures
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACTIVECAMPAIGN_API_KEY: ACTIVECAMPAIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: sms-failures
    baseUri: https://{yourAccountName}.api-us1.com/api/3
    description: ActiveCampaign SMS Broadcast API — Failures business capability. Self-contained, no shared references.
    resources:
    - name: sms-broadcasts-metrics-broadcastId-failures
      path: /sms/broadcasts/metrics/{broadcastId}/failures
      operations:
      - name: getbroadcastfailures
        method: GET
        description: ActiveCampaign Get Broadcast Failure Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: broadcastId
          in: path
          type: integer
          description: Broadcast ID
          required: true
        - name: start_date
          in: query
          type: string
          description: Start date (YYYY-MM-DD)
        - name: end_date
          in: query
          type: string
          description: End date (YYYY-MM-DD)
    authentication:
      type: apikey
      key: Api-Token
      value: '{{env.ACTIVECAMPAIGN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: sms-failures-rest
    port: 8080
    description: REST adapter for ActiveCampaign SMS Broadcast API — Failures. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/sms/broadcasts/metrics/{broadcastid}/failures
      name: sms-broadcasts-metrics-broadcastid-failures
      description: REST surface for sms-broadcasts-metrics-broadcastId-failures.
      operations:
      - method: GET
        name: getbroadcastfailures
        description: ActiveCampaign Get Broadcast Failure Details
        call: sms-failures.getbroadcastfailures
        with:
          broadcastId: rest.broadcastId
          start_date: rest.start_date
          end_date: rest.end_date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sms-failures-mcp
    port: 9090
    transport: http
    description: MCP adapter for ActiveCampaign SMS Broadcast API — Failures. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: activecampaign-get-broadcast-failure-details
      description: ActiveCampaign Get Broadcast Failure Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sms-failures.getbroadcastfailures
      with:
        broadcastId: tools.broadcastId
        start_date: tools.start_date
        end_date: tools.end_date
      outputParameters:
      - type: object
        mapping: $.
