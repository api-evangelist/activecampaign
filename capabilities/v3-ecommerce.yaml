        destructive: false
        idempotent: true
      call: v3-ecommerce.listallcustomers
      with:
        filters[email]: tools.filters[email]
        filters[externalid]: tools.filters[externalid]
        filters[connectionid]: tools.filters[connectionid]
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-retrieve-customer
