      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-ecommerce.listecomorderproducts
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-retrieve-ecomorderproduct
      description: ActiveCampaign Retrieve an EcomOrderProduct
      hints:
