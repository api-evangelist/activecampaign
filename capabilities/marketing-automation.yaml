naftiko: "1.0.0-alpha1"

info:
  label: "ActiveCampaign Marketing Automation"
  description: "Unified workflow capability for marketing automation, contact management, campaign execution, and list segmentation. Used by marketing teams and growth engineers to orchestrate multi-channel customer journeys."
  tags:
    - ActiveCampaign
    - Marketing Automation
    - Email Marketing
    - Contacts
    - Campaigns
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ACTIVECAMPAIGN_API_TOKEN: ACTIVECAMPAIGN_API_TOKEN
      ACTIVECAMPAIGN_API_URL: ACTIVECAMPAIGN_API_URL

capability:
  consumes:
    - import: activecampaign-v3
      location: ./shared/activecampaign-v3.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: marketing-automation-api
      description: "Unified REST API for marketing automation workflows."
      resources:
        - path: /v1/contacts
          name: contacts
          description: "Contact lifecycle management"
          operations:
            - method: GET
              name: list-contacts
              description: "List and search contacts"
              call: "activecampaign-v3.list-contacts"
              with:
                email: "rest.email"
                limit: "rest.limit"
                offset: "rest.offset"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-contact
              description: "Create a new contact"
              call: "activecampaign-v3.create-contact"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/campaigns
          name: campaigns
          description: "Email campaign management"
          operations:
            - method: GET
              name: list-campaigns
              description: "List all campaigns"
              call: "activecampaign-v3.list-campaigns"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/automations
          name: automations
          description: "Marketing automation workflows"
          operations:
            - method: GET
              name: list-automations
              description: "List all automations"
              call: "activecampaign-v3.list-automations"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/lists
          name: lists
          description: "Contact list management"
          operations:
            - method: GET
              name: list-lists
              description: "List all contact lists"
              call: "activecampaign-v3.list-lists"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-list
              description: "Create a new contact list"
              call: "activecampaign-v3.create-list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tags
          name: tags
          description: "Contact tag management"
          operations:
            - method: GET
              name: list-tags
              description: "List all tags"
              call: "activecampaign-v3.list-tags"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: marketing-automation-mcp
      transport: http
      description: "MCP server for AI-assisted marketing automation with ActiveCampaign."
      tools:
        - name: list-contacts
          description: "List and search ActiveCampaign contacts by email, name, or other criteria"
          hints:
            readOnly: true
            openWorld: true
          call: "activecampaign-v3.list-contacts"
          with:
            email: "tools.email"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-contact
          description: "Create a new contact in ActiveCampaign"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "activecampaign-v3.create-contact"
          outputParameters:
            - type: object
              mapping: "$."
        - name: sync-contact
          description: "Sync a contact's data to ActiveCampaign, creating or updating as needed"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "activecampaign-v3.sync-contact"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-campaigns
          description: "List all email campaigns in ActiveCampaign"
          hints:
            readOnly: true
            openWorld: true
          call: "activecampaign-v3.list-campaigns"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-automations
          description: "List all marketing automations in ActiveCampaign"
          hints:
            readOnly: true
            openWorld: true
          call: "activecampaign-v3.list-automations"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-contact-lists
          description: "List all contact lists in ActiveCampaign"
          hints:
            readOnly: true
            openWorld: true
          call: "activecampaign-v3.list-lists"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tags
          description: "List all contact tags in ActiveCampaign"
          hints:
            readOnly: true
            openWorld: true
          call: "activecampaign-v3.list-tags"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-tag
          description: "Create a new contact tag in ActiveCampaign"
          hints:
            readOnly: false
            destructive: false
          call: "activecampaign-v3.create-tag"
          outputParameters:
            - type: object
              mapping: "$."
