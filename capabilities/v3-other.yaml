    - name: activecampaign-retrieve-contacts-geo-ip
      description: ActiveCampaign Retrieve a Contacts Geo IP Address
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-other.retrieveacontactsgeoipaddress
      with:
        geoAddressID: tools.geoAddressID
