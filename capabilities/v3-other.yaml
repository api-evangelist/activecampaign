    - name: activecampaign-add-domain-whitelist
      description: ActiveCampaign Add Domain to Whitelist
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v3-other.adddomaintowhitelist
      with:
        body: tools.body
