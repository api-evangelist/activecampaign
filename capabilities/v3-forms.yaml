    port: 9090
    transport: http
    description: MCP adapter for ActiveCampaign API v3 — Forms. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: postformoptin
      description: postformoptin
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v3-forms.postformoptin
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-list-all-forms
      description: ActiveCampaign List All Forms
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-forms.forms1
      outputParameters:
      - type: object
        mapping: $.
    - name: postforms
      description: postforms
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v3-forms.postforms
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-retrieve-form
      description: ActiveCampaign Retrieve a Form
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-forms.retrieveforms
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: deleteformsid
      description: deleteformsid
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: v3-forms.deleteformsid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: putformsid
      description: putformsid
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: v3-forms.putformsid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
