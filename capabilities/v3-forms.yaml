    namespace: v3-forms
    baseUri: https://{yourAccountName}.api-us1.com/api/3
    description: ActiveCampaign API v3 — Forms business capability. Self-contained, no shared references.
    resources:
    - name: form-optin
      path: /form/optin
      operations:
      - name: postformoptin
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: forms
      path: /forms
      operations:
      - name: forms1
        method: GET
        description: ActiveCampaign List All Forms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postforms
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: forms-id
      path: /forms/{id}
      operations:
      - name: retrieveforms
        method: GET
        description: ActiveCampaign Retrieve a Form
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the form to retrieve
          required: true
      - name: deleteformsid
        method: DELETE
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: form id
          required: true
      - name: putformsid
        method: PUT
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
    authentication:
      type: apikey
      key: Api-Token
      value: '{{env.ACTIVECAMPAIGN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: v3-forms-rest
    port: 8080
    description: REST adapter for ActiveCampaign API v3 — Forms. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/form/optin
      name: form-optin
      description: REST surface for form-optin.
      operations:
      - method: POST
        name: postformoptin
        description: postformoptin
        call: v3-forms.postformoptin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/forms
      name: forms
      description: REST surface for forms.
      operations:
      - method: GET
        name: forms1
        description: ActiveCampaign List All Forms
        call: v3-forms.forms1
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postforms
        description: postforms
        call: v3-forms.postforms
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/forms/{id}
      name: forms-id
      description: REST surface for forms-id.
      operations:
      - method: GET
        name: retrieveforms
        description: ActiveCampaign Retrieve a Form
        call: v3-forms.retrieveforms
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteformsid
        description: deleteformsid
        call: v3-forms.deleteformsid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putformsid
        description: putformsid
        call: v3-forms.putformsid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
