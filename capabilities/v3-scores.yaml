naftiko: 1.0.0-alpha2
info:
  label: ActiveCampaign API v3 — Scores
  description: 'ActiveCampaign API v3 — Scores. 2 operations. Lead operation: ActiveCampaign List All Scores. Self-contained
    Naftiko capability covering one Activecampaign business surface.'
  tags:
  - Activecampaign
  - Scores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACTIVECAMPAIGN_API_KEY: ACTIVECAMPAIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: v3-scores
    baseUri: https://{yourAccountName}.api-us1.com/api/3
    description: ActiveCampaign API v3 — Scores business capability. Self-contained, no shared references.
    resources:
    - name: scores
      path: /scores
      operations:
      - name: listallscores
        method: GET
        description: ActiveCampaign List All Scores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: scores-id
      path: /scores/{id}
      operations:
      - name: retrieveascore
        method: GET
        description: ActiveCampaign Retrieve a Score
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the score to retrieve
          required: true
    authentication:
      type: apikey
      key: Api-Token
      value: '{{env.ACTIVECAMPAIGN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: v3-scores-rest
    port: 8080
    description: REST adapter for ActiveCampaign API v3 — Scores. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/scores
      name: scores
      description: REST surface for scores.
      operations:
      - method: GET
        name: listallscores
        description: ActiveCampaign List All Scores
        call: v3-scores.listallscores
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/scores/{id}
      name: scores-id
      description: REST surface for scores-id.
      operations:
      - method: GET
        name: retrieveascore
        description: ActiveCampaign Retrieve a Score
        call: v3-scores.retrieveascore
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v3-scores-mcp
    port: 9090
    transport: http
    description: MCP adapter for ActiveCampaign API v3 — Scores. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: activecampaign-list-all-scores
      description: ActiveCampaign List All Scores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-scores.listallscores
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-retrieve-score
      description: ActiveCampaign Retrieve a Score
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-scores.retrieveascore
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
