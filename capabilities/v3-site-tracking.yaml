naftiko: 1.0.0-alpha2
info:
  label: ActiveCampaign API v3 — Site Tracking
  description: 'ActiveCampaign API v3 — Site Tracking. 3 operations. Lead operation: ActiveCampaign Retrieve Status. Self-contained
    Naftiko capability covering one Activecampaign business surface.'
  tags:
  - Activecampaign
  - Site Tracking
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACTIVECAMPAIGN_API_KEY: ACTIVECAMPAIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: v3-site-tracking
    baseUri: https://{yourAccountName}.api-us1.com/api/3
    description: ActiveCampaign API v3 — Site Tracking business capability. Self-contained, no shared references.
    resources:
    - name: siteTracking
      path: /siteTracking
      operations:
      - name: retrievesitetrackingstatus
        method: GET
        description: ActiveCampaign Retrieve Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: enabledisablesitetracking
        method: PUT
        description: ActiveCampaign Enable/disable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: siteTracking-code
      path: /siteTracking/code
      operations:
      - name: retrievesitetrackingcode
        method: GET
        description: ActiveCampaign Retrieve Site Tracking Code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Api-Token
      value: '{{env.ACTIVECAMPAIGN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: v3-site-tracking-rest
    port: 8080
    description: REST adapter for ActiveCampaign API v3 — Site Tracking. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sitetracking
      name: sitetracking
      description: REST surface for siteTracking.
      operations:
      - method: GET
        name: retrievesitetrackingstatus
        description: ActiveCampaign Retrieve Status
        call: v3-site-tracking.retrievesitetrackingstatus
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: enabledisablesitetracking
        description: ActiveCampaign Enable/disable
        call: v3-site-tracking.enabledisablesitetracking
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sitetracking/code
      name: sitetracking-code
      description: REST surface for siteTracking-code.
      operations:
      - method: GET
        name: retrievesitetrackingcode
        description: ActiveCampaign Retrieve Site Tracking Code
        call: v3-site-tracking.retrievesitetrackingcode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v3-site-tracking-mcp
    port: 9090
    transport: http
    description: MCP adapter for ActiveCampaign API v3 — Site Tracking. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: activecampaign-retrieve-status
      description: ActiveCampaign Retrieve Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-site-tracking.retrievesitetrackingstatus
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-enable-disable
      description: ActiveCampaign Enable/disable
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: v3-site-tracking.enabledisablesitetracking
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-retrieve-site-tracking-code
      description: ActiveCampaign Retrieve Site Tracking Code
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-site-tracking.retrievesitetrackingcode
      outputParameters:
      - type: object
        mapping: $.
