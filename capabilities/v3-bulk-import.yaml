naftiko: 1.0.0-alpha2
info:
  label: ActiveCampaign API v3 — Bulk Import
  description: 'ActiveCampaign API v3 — Bulk Import. 3 operations. Lead operation: ActiveCampaign Bulk Import Contacts. Self-contained
    Naftiko capability covering one Activecampaign business surface.'
  tags:
  - Activecampaign
  - Bulk Import
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACTIVECAMPAIGN_API_KEY: ACTIVECAMPAIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: v3-bulk-import
    baseUri: https://{yourAccountName}.api-us1.com/api/3
    description: ActiveCampaign API v3 — Bulk Import business capability. Self-contained, no shared references.
    resources:
    - name: import-bulk_import
      path: /import/bulk_import
      operations:
      - name: bulkimportcontacts
        method: POST
        description: ActiveCampaign Bulk Import Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: Api-Token
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: bulkimportstatuslist
        method: GET
        description: ActiveCampaign Bulk Import Status List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: import-info
      path: /import/info
      operations:
      - name: bulkimportstatusinfo
        method: GET
        description: ActiveCampaign Bulk Import Status Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: batchId
          in: query
          type: string
    authentication:
      type: apikey
      key: Api-Token
      value: '{{env.ACTIVECAMPAIGN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: v3-bulk-import-rest
    port: 8080
    description: REST adapter for ActiveCampaign API v3 — Bulk Import. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/import/bulk-import
      name: import-bulk-import
      description: REST surface for import-bulk_import.
      operations:
      - method: POST
        name: bulkimportcontacts
        description: ActiveCampaign Bulk Import Contacts
        call: v3-bulk-import.bulkimportcontacts
        with:
          Content-Type: rest.Content-Type
          Api-Token: rest.Api-Token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: bulkimportstatuslist
        description: ActiveCampaign Bulk Import Status List
        call: v3-bulk-import.bulkimportstatuslist
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/import/info
      name: import-info
      description: REST surface for import-info.
      operations:
      - method: GET
        name: bulkimportstatusinfo
        description: ActiveCampaign Bulk Import Status Info
        call: v3-bulk-import.bulkimportstatusinfo
        with:
          batchId: rest.batchId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v3-bulk-import-mcp
    port: 9090
    transport: http
    description: MCP adapter for ActiveCampaign API v3 — Bulk Import. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: activecampaign-bulk-import-contacts
      description: ActiveCampaign Bulk Import Contacts
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v3-bulk-import.bulkimportcontacts
      with:
        Content-Type: tools.Content-Type
        Api-Token: tools.Api-Token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-bulk-import-status-list
      description: ActiveCampaign Bulk Import Status List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-bulk-import.bulkimportstatuslist
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-bulk-import-status-info
      description: ActiveCampaign Bulk Import Status Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-bulk-import.bulkimportstatusinfo
      with:
        batchId: tools.batchId
      outputParameters:
      - type: object
        mapping: $.
