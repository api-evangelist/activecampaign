        method: GET
        description: ActiveCampaign Retrieve an Exclusion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the exclusion to retrieve
          required: true
      - name: updateanexclusion
        method: PUT
        description: ActiveCampaign Update an Exclusion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The Exclusion's ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: lists-id
      path: /lists/{id}
      operations:
      - name: retrievealist
        method: GET
        description: ActiveCampaign Retrieve a List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the lists to retrieve
          required: true
      - name: deletealist
        method: DELETE
        description: ActiveCampaign Delete a List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
