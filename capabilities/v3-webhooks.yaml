      description: ActiveCampaign List All Webhook Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-webhooks.getalistofwebhookevents
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-create-webhook
