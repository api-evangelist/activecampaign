      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-webhooks.getwebhook
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-update-webhook
      description: ActiveCampaign Update a Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: v3-webhooks.updatewebhook
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-delete-webhook
      description: ActiveCampaign Delete a Webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: v3-webhooks.deletewebhook
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
