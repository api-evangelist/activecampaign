naftiko: 1.0.0-alpha2
info:
  label: ActiveCampaign API v3 — Webhooks
  description: 'ActiveCampaign API v3 — Webhooks. 6 operations. Lead operation: ActiveCampaign List All Webhook Events. Self-contained
    Naftiko capability covering one Activecampaign business surface.'
  tags:
  - Activecampaign
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACTIVECAMPAIGN_API_KEY: ACTIVECAMPAIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: v3-webhooks
    baseUri: https://{yourAccountName}.api-us1.com/api/3
    description: ActiveCampaign API v3 — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: webhook-events
      path: /webhook/events
      operations:
      - name: getalistofwebhookevents
        method: GET
        description: ActiveCampaign List All Webhook Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: webhooks
      path: /webhooks
      operations:
      - name: createwebhook
        method: POST
        description: ActiveCampaign Create a Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getalistofwebhooks
        method: GET
        description: ActiveCampaign List All Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filters[name]
          in: query
          type: string
          description: Filter by webhook name
        - name: filters[url]
          in: query
          type: string
          description: Filter by webhook url
        - name: filters[listid]
          in: query
          type: string
          description: Filter by webhook's associated list
    - name: webhooks-id
      path: /webhooks/{id}
      operations:
      - name: getwebhook
        method: GET
        description: ActiveCampaign Retrieve a Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
      - name: updatewebhook
        method: PUT
        description: ActiveCampaign Update a Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The webhook id
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletewebhook
        method: DELETE
        description: ActiveCampaign Delete a Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The webhook id
          required: true
    authentication:
      type: apikey
      key: Api-Token
      value: '{{env.ACTIVECAMPAIGN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: v3-webhooks-rest
    port: 8080
    description: REST adapter for ActiveCampaign API v3 — Webhooks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/webhook/events
      name: webhook-events
      description: REST surface for webhook-events.
      operations:
      - method: GET
        name: getalistofwebhookevents
        description: ActiveCampaign List All Webhook Events
        call: v3-webhooks.getalistofwebhookevents
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks
      name: webhooks
      description: REST surface for webhooks.
      operations:
      - method: POST
        name: createwebhook
        description: ActiveCampaign Create a Webhook
        call: v3-webhooks.createwebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getalistofwebhooks
        description: ActiveCampaign List All Webhooks
        call: v3-webhooks.getalistofwebhooks
        with:
          filters[name]: rest.filters[name]
          filters[url]: rest.filters[url]
          filters[listid]: rest.filters[listid]
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{id}
      name: webhooks-id
      description: REST surface for webhooks-id.
      operations:
      - method: GET
        name: getwebhook
        description: ActiveCampaign Retrieve a Webhook
        call: v3-webhooks.getwebhook
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatewebhook
        description: ActiveCampaign Update a Webhook
        call: v3-webhooks.updatewebhook
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletewebhook
        description: ActiveCampaign Delete a Webhook
        call: v3-webhooks.deletewebhook
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
