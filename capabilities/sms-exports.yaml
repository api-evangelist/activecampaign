naftiko: 1.0.0-alpha2
info:
  label: ActiveCampaign SMS Broadcast API — Exports
  description: 'ActiveCampaign SMS Broadcast API — Exports. 2 operations. Lead operation: ActiveCampaign Export Broadcast
    Metrics. Self-contained Naftiko capability covering one Activecampaign business surface.'
  tags:
  - Activecampaign
  - Exports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACTIVECAMPAIGN_API_KEY: ACTIVECAMPAIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: sms-exports
    baseUri: https://{yourAccountName}.api-us1.com/api/3
    description: ActiveCampaign SMS Broadcast API — Exports business capability. Self-contained, no shared references.
    resources:
    - name: sms-broadcasts-export
      path: /sms/broadcasts/export
      operations:
      - name: exportbroadcastmetrics
        method: POST
        description: ActiveCampaign Export Broadcast Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sms-broadcasts-broadcastId-recipients-export
      path: /sms/broadcasts/{broadcastId}/recipients/export
      operations:
      - name: exportbroadcastrecipients
        method: POST
        description: ActiveCampaign Export Broadcast Recipients
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: broadcastId
          in: path
          type: integer
          description: Broadcast ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Api-Token
      value: '{{env.ACTIVECAMPAIGN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: sms-exports-rest
    port: 8080
    description: REST adapter for ActiveCampaign SMS Broadcast API — Exports. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/sms/broadcasts/export
      name: sms-broadcasts-export
      description: REST surface for sms-broadcasts-export.
      operations:
      - method: POST
        name: exportbroadcastmetrics
        description: ActiveCampaign Export Broadcast Metrics
        call: sms-exports.exportbroadcastmetrics
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sms/broadcasts/{broadcastid}/recipients/export
      name: sms-broadcasts-broadcastid-recipients-export
      description: REST surface for sms-broadcasts-broadcastId-recipients-export.
      operations:
      - method: POST
        name: exportbroadcastrecipients
        description: ActiveCampaign Export Broadcast Recipients
        call: sms-exports.exportbroadcastrecipients
        with:
          broadcastId: rest.broadcastId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sms-exports-mcp
    port: 9090
    transport: http
    description: MCP adapter for ActiveCampaign SMS Broadcast API — Exports. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: activecampaign-export-broadcast-metrics
      description: ActiveCampaign Export Broadcast Metrics
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sms-exports.exportbroadcastmetrics
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-export-broadcast-recipients
      description: ActiveCampaign Export Broadcast Recipients
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sms-exports.exportbroadcastrecipients
      with:
        broadcastId: tools.broadcastId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
