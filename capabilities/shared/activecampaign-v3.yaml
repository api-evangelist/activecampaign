naftiko: "1.0.0-alpha1"

info:
  label: "ActiveCampaign API v3"
  description: "Primary REST API for ActiveCampaign covering contacts, deals, accounts, automations, campaigns, lists, tags, and more."
  tags:
    - ActiveCampaign
    - Marketing Automation
    - CRM
    - Email Marketing
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ACTIVECAMPAIGN_API_TOKEN: ACTIVECAMPAIGN_API_TOKEN
      ACTIVECAMPAIGN_API_URL: ACTIVECAMPAIGN_API_URL

capability:
  consumes:
    - type: http
      namespace: activecampaign-v3
      baseUri: "https://{yourAccountName}.api-us1.com/api/3"
      description: "ActiveCampaign REST API v3"
      authentication:
        type: apikey
        key: Api-Token
        value: "{{ACTIVECAMPAIGN_API_TOKEN}}"
        placement: header
      resources:
        - name: contacts
          path: /contacts
          description: "Manage contacts - the center of all ActiveCampaign activity"
          operations:
            - name: list-contacts
              method: GET
              description: "List, search, and filter contacts"
              inputParameters:
                - name: email
                  in: query
                  type: string
                  required: false
                  description: "Filter contacts by email"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results to return"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Offset for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-contact
              method: POST
              description: "Create a new contact"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  contact: "{{tools.contact}}"
            - name: get-contact
              method: GET
              description: "Retrieve a contact by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Contact ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-contact
              method: PUT
              description: "Update a contact"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Contact ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-contact
              method: DELETE
              description: "Delete a contact"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Contact ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: sync-contact
              method: POST
              description: "Sync a contact's data"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: deals
          path: /deals
          description: "Manage sales deals and pipeline"
          operations:
            - name: list-deals
              method: GET
              description: "List all deals"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-deal
              method: POST
              description: "Create a new deal"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-deal
              method: GET
              description: "Retrieve a deal by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Deal ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-deal
              method: PUT
              description: "Update a deal"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Deal ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: accounts
          path: /accounts
          description: "Manage company accounts"
          operations:
            - name: list-accounts
              method: GET
              description: "Retrieve all accounts"
              inputParameters:
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search term"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-account
              method: POST
              description: "Create a new account"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-account
              method: GET
              description: "Retrieve an account"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: automations
          path: /automations
          description: "Manage marketing automations"
          operations:
            - name: list-automations
              method: GET
              description: "List all automations"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: campaigns
          path: /campaigns
          description: "Manage email campaigns"
          operations:
            - name: list-campaigns
              method: GET
              description: "List all campaigns"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: lists
          path: /lists
          description: "Manage contact lists"
          operations:
            - name: list-lists
              method: GET
              description: "Retrieve all lists"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-list
              method: POST
              description: "Create a new list"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tags
          path: /tags
          description: "Manage contact tags"
          operations:
            - name: list-tags
              method: GET
              description: "List all tags"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-tag
              method: POST
              description: "Create a new tag"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: webhooks
          path: /webhooks
          description: "Manage event webhooks"
          operations:
            - name: list-webhooks
              method: GET
              description: "List all webhooks"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-webhook
              method: POST
              description: "Create a new webhook"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: activecampaign-v3-rest
      resources:
        - path: /v1/contacts
          name: contacts
          description: "Contact management operations"
          operations:
            - method: GET
              name: list-contacts
              description: "List and search contacts"
              call: "activecampaign-v3.list-contacts"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-contact
              description: "Create a new contact"
              call: "activecampaign-v3.create-contact"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/deals
          name: deals
          description: "Deal management operations"
          operations:
            - method: GET
              name: list-deals
              description: "List all deals"
              call: "activecampaign-v3.list-deals"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: activecampaign-v3-mcp
      transport: http
      tools:
        - name: list-contacts
          description: "List and search ActiveCampaign contacts"
          hints:
            readOnly: true
            openWorld: true
          call: "activecampaign-v3.list-contacts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-contact
          description: "Create a new ActiveCampaign contact"
          hints:
            readOnly: false
            destructive: false
          call: "activecampaign-v3.create-contact"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-deals
          description: "List ActiveCampaign sales deals"
          hints:
            readOnly: true
            openWorld: true
          call: "activecampaign-v3.list-deals"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-automations
          description: "List ActiveCampaign automations"
          hints:
            readOnly: true
            openWorld: true
          call: "activecampaign-v3.list-automations"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-campaigns
          description: "List ActiveCampaign email campaigns"
          hints:
            readOnly: true
            openWorld: true
          call: "activecampaign-v3.list-campaigns"
          outputParameters:
            - type: object
              mapping: "$."
