naftiko: 1.0.0-alpha2
info:
  label: ActiveCampaign CRM and Sales
  description: Workflow capability for CRM and sales pipeline management including deals, accounts, tasks, and pipeline stages.
    Used by sales teams and revenue operations to track and advance deals.
  tags:
  - ActiveCampaign
  - CRM
  - Sales
  - Deals
  - Accounts
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ACTIVECAMPAIGN_API_TOKEN: ACTIVECAMPAIGN_API_TOKEN
    ACTIVECAMPAIGN_API_URL: ACTIVECAMPAIGN_API_URL
capability:
  consumes:
  - type: http
    namespace: activecampaign-v3
    baseUri: https://{yourAccountName}.api-us1.com/api/3
    description: ActiveCampaign REST API v3
    authentication:
      type: apikey
      key: Api-Token
      value: '{{ACTIVECAMPAIGN_API_TOKEN}}'
      placement: header
    resources:
    - name: contacts
      path: /contacts
      description: Manage contacts - the center of all ActiveCampaign activity
      operations:
      - name: list-contacts
        method: GET
        description: List, search, and filter contacts
        inputParameters:
        - name: email
          in: query
          type: string
          required: false
          description: Filter contacts by email
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of results to return
        - name: offset
          in: query
          type: integer
          required: false
          description: Offset for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-contact
        method: POST
        description: Create a new contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            contact: '{{tools.contact}}'
      - name: get-contact
        method: GET
        description: Retrieve a contact by ID
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Contact ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-contact
        method: PUT
        description: Update a contact
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Contact ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-contact
        method: DELETE
        description: Delete a contact
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Contact ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: sync-contact
        method: POST
        description: Sync a contact's data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deals
      path: /deals
      description: Manage sales deals and pipeline
      operations:
      - name: list-deals
        method: GET
        description: List all deals
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-deal
        method: POST
        description: Create a new deal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-deal
        method: GET
        description: Retrieve a deal by ID
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Deal ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-deal
        method: PUT
        description: Update a deal
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Deal ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: accounts
      path: /accounts
      description: Manage company accounts
      operations:
      - name: list-accounts
        method: GET
        description: Retrieve all accounts
        inputParameters:
        - name: search
          in: query
          type: string
          required: false
          description: Search term
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-account
        method: POST
        description: Create a new account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-account
        method: GET
        description: Retrieve an account
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Account ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: automations
      path: /automations
      description: Manage marketing automations
      operations:
      - name: list-automations
        method: GET
        description: List all automations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: campaigns
      path: /campaigns
      description: Manage email campaigns
      operations:
      - name: list-campaigns
        method: GET
        description: List all campaigns
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lists
      path: /lists
      description: Manage contact lists
      operations:
      - name: list-lists
        method: GET
        description: Retrieve all lists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-list
        method: POST
        description: Create a new list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tags
      path: /tags
      description: Manage contact tags
      operations:
      - name: list-tags
        method: GET
        description: List all tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-tag
        method: POST
        description: Create a new tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: webhooks
      path: /webhooks
      description: Manage event webhooks
      operations:
      - name: list-webhooks
        method: GET
        description: List all webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-webhook
        method: POST
        description: Create a new webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: crm-sales-api
    description: Unified REST API for CRM and sales pipeline workflows.
    resources:
    - path: /v1/deals
      name: deals
      description: Sales deal management
      operations:
      - method: GET
        name: list-deals
        description: List all deals
        call: activecampaign-v3.list-deals
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-deal
        description: Create a new deal
        call: activecampaign-v3.create-deal
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts
      name: accounts
      description: Company account management
      operations:
      - method: GET
        name: list-accounts
        description: List all accounts
        call: activecampaign-v3.list-accounts
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-account
        description: Create a new account
        call: activecampaign-v3.create-account
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: crm-sales-mcp
    transport: http
    description: MCP server for AI-assisted CRM and sales pipeline management.
    tools:
    - name: list-deals
      description: List all sales deals in ActiveCampaign CRM
      hints:
        readOnly: true
        openWorld: true
      call: activecampaign-v3.list-deals
      outputParameters:
      - type: object
        mapping: $.
    - name: create-deal
      description: Create a new sales deal in ActiveCampaign CRM
      hints:
        readOnly: false
        destructive: false
      call: activecampaign-v3.create-deal
      outputParameters:
      - type: object
        mapping: $.
    - name: get-deal
      description: Retrieve a specific deal by ID
      hints:
        readOnly: true
        openWorld: false
      call: activecampaign-v3.get-deal
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-accounts
      description: List all company accounts in ActiveCampaign CRM
      hints:
        readOnly: true
        openWorld: true
      call: activecampaign-v3.list-accounts
      outputParameters:
      - type: object
        mapping: $.
    - name: create-account
      description: Create a new company account in ActiveCampaign CRM
      hints:
        readOnly: false
        destructive: false
      call: activecampaign-v3.create-account
      outputParameters:
      - type: object
        mapping: $.
