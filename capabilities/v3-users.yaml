naftiko: 1.0.0-alpha2
info:
  label: ActiveCampaign API v3 — Users
  description: 'ActiveCampaign API v3 — Users. 8 operations. Lead operation: ActiveCampaign Create a User. Self-contained
    Naftiko capability covering one Activecampaign business surface.'
  tags:
  - Activecampaign
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACTIVECAMPAIGN_API_KEY: ACTIVECAMPAIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: v3-users
    baseUri: https://{yourAccountName}.api-us1.com/api/3
    description: ActiveCampaign API v3 — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: createuser
        method: POST
        description: ActiveCampaign Create a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: listallusers
        method: GET
        description: ActiveCampaign List All Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-email-email
      path: /users/email/{email}
      operations:
      - name: getuseremail
        method: GET
        description: ActiveCampaign Retrieve a User by Email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: email
          in: path
          type: string
          description: Email address of the user you want to view
          required: true
    - name: users-me
      path: /users/me
      operations:
      - name: getuserloggedin
        method: GET
        description: ActiveCampaign Retrieve Logged-in User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-username-username
      path: /users/username/{username}
      operations:
      - name: getuserusername
        method: GET
        description: ActiveCampaign Retrieve a User by Username
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          description: Username of the user you want to view
          required: true
    - name: users-id
      path: /users/{id}
      operations:
      - name: getuser
        method: GET
        description: ActiveCampaign Retrieve a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the user you want to view
          required: true
      - name: updateuser
        method: PUT
        description: ActiveCampaign Update a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the user
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteuser
        method: DELETE
        description: ActiveCampaign Delete a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the user you wish to delete
          required: true
    authentication:
      type: apikey
      key: Api-Token
      value: '{{env.ACTIVECAMPAIGN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: v3-users-rest
    port: 8080
    description: REST adapter for ActiveCampaign API v3 — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: POST
        name: createuser
        description: ActiveCampaign Create a User
        call: v3-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listallusers
        description: ActiveCampaign List All Users
        call: v3-users.listallusers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/email/{email}
      name: users-email-email
      description: REST surface for users-email-email.
      operations:
      - method: GET
        name: getuseremail
        description: ActiveCampaign Retrieve a User by Email
        call: v3-users.getuseremail
        with:
          email: rest.email
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/me
      name: users-me
      description: REST surface for users-me.
      operations:
      - method: GET
        name: getuserloggedin
        description: ActiveCampaign Retrieve Logged-in User
        call: v3-users.getuserloggedin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/username/{username}
      name: users-username-username
      description: REST surface for users-username-username.
      operations:
      - method: GET
        name: getuserusername
        description: ActiveCampaign Retrieve a User by Username
        call: v3-users.getuserusername
        with:
          username: rest.username
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{id}
      name: users-id
      description: REST surface for users-id.
      operations:
      - method: GET
        name: getuser
        description: ActiveCampaign Retrieve a User
        call: v3-users.getuser
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateuser
        description: ActiveCampaign Update a User
        call: v3-users.updateuser
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: ActiveCampaign Delete a User
        call: v3-users.deleteuser
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v3-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for ActiveCampaign API v3 — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: activecampaign-create-user
      description: ActiveCampaign Create a User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v3-users.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-list-all-users
      description: ActiveCampaign List All Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-users.listallusers
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-retrieve-user-email
