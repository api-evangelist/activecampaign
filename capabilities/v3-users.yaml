      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-users.getuseremail
      with:
        email: tools.email
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-retrieve-logged-user
      description: ActiveCampaign Retrieve Logged-in User
      hints:
        readOnly: true
