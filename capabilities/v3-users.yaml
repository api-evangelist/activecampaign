      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-users.getuser
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-update-user
      description: ActiveCampaign Update a User
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: v3-users.updateuser
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-delete-user
      description: ActiveCampaign Delete a User
      hints:
