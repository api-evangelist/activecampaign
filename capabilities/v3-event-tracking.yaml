naftiko: 1.0.0-alpha2
info:
  label: ActiveCampaign API v3 — Event Tracking
  description: 'ActiveCampaign API v3 — Event Tracking. 5 operations. Lead operation: ActiveCampaign Retrieve Event Tracking
    Status. Self-contained Naftiko capability covering one Activecampaign business surface.'
  tags:
  - Activecampaign
  - Event Tracking
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACTIVECAMPAIGN_API_KEY: ACTIVECAMPAIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: v3-event-tracking
    baseUri: https://{yourAccountName}.api-us1.com/api/3
    description: ActiveCampaign API v3 — Event Tracking business capability. Self-contained, no shared references.
    resources:
    - name: eventTracking
      path: /eventTracking
      operations:
      - name: retrieveeventtrackingstatus
        method: GET
        description: ActiveCampaign Retrieve Event Tracking Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: enabledisableeventtracking
        method: PUT
        description: ActiveCampaign Enable/disable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: eventTrackingEvents
      path: /eventTrackingEvents
      operations:
      - name: createaneweventnameonly
        method: POST
        description: ActiveCampaign Create a New Event (name Only)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: listalleventtypes
        method: GET
        description: ActiveCampaign List All Events (names Only)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: eventTrackingEvents-eventName
      path: /eventTrackingEvents/{eventName}
      operations:
      - name: removeeventnameonly
        method: DELETE
        description: ActiveCampaign Delete Event (name Only)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: eventName
          in: path
          type: string
          description: Name of event to delete. Spaces in names are allowed, but must be encoded (for example, "my%20event").
          required: true
    authentication:
      type: apikey
      key: Api-Token
      value: '{{env.ACTIVECAMPAIGN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: v3-event-tracking-rest
    port: 8080
    description: REST adapter for ActiveCampaign API v3 — Event Tracking. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/eventtracking
      name: eventtracking
      description: REST surface for eventTracking.
      operations:
      - method: GET
        name: retrieveeventtrackingstatus
        description: ActiveCampaign Retrieve Event Tracking Status
        call: v3-event-tracking.retrieveeventtrackingstatus
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: enabledisableeventtracking
        description: ActiveCampaign Enable/disable
        call: v3-event-tracking.enabledisableeventtracking
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eventtrackingevents
      name: eventtrackingevents
      description: REST surface for eventTrackingEvents.
      operations:
      - method: POST
        name: createaneweventnameonly
        description: ActiveCampaign Create a New Event (name Only)
        call: v3-event-tracking.createaneweventnameonly
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listalleventtypes
        description: ActiveCampaign List All Events (names Only)
        call: v3-event-tracking.listalleventtypes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eventtrackingevents/{eventname}
      name: eventtrackingevents-eventname
      description: REST surface for eventTrackingEvents-eventName.
      operations:
      - method: DELETE
        name: removeeventnameonly
        description: ActiveCampaign Delete Event (name Only)
        call: v3-event-tracking.removeeventnameonly
        with:
          eventName: rest.eventName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v3-event-tracking-mcp
    port: 9090
    transport: http
    description: MCP adapter for ActiveCampaign API v3 — Event Tracking. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: activecampaign-retrieve-event-tracking-status
      description: ActiveCampaign Retrieve Event Tracking Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-event-tracking.retrieveeventtrackingstatus
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-enable-disable
      description: ActiveCampaign Enable/disable
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: v3-event-tracking.enabledisableeventtracking
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-create-new-event-name
      description: ActiveCampaign Create a New Event (name Only)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v3-event-tracking.createaneweventnameonly
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-list-all-events-names
      description: ActiveCampaign List All Events (names Only)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v3-event-tracking.listalleventtypes
      outputParameters:
      - type: object
        mapping: $.
    - name: activecampaign-delete-event-name-only
      description: ActiveCampaign Delete Event (name Only)
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: v3-event-tracking.removeeventnameonly
      with:
        eventName: tools.eventName
      outputParameters:
      - type: object
        mapping: $.
