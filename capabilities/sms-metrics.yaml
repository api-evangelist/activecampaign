    description: ActiveCampaign SMS Broadcast API — Metrics business capability. Self-contained, no shared references.
    resources:
    - name: sms-broadcasts-export
      path: /sms/broadcasts/export
      operations:
      - name: exportbroadcastmetrics
        method: POST
        description: ActiveCampaign Export Broadcast Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sms-broadcasts-metrics
      path: /sms/broadcasts/metrics
      operations:
      - name: getbroadcastmetrics
        method: POST
        description: ActiveCampaign Get All Broadcast Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start_date
          in: query
          type: string
          description: Start date for metrics (YYYY-MM-DD)
        - name: end_date
          in: query
          type: string
          description: End date for metrics (YYYY-MM-DD)
